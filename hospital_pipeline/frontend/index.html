<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPipeline — Hospital Data Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #06090f;
            --s1: #0c1420;
            --s2: #101828;
            --border: #1a2840;
            --cyan: #0ea5e9;
            --green: #22c55e;
            --red: #ef4444;
            --gold: #f59e0b;
            --purple: #a855f7;
            --text: #cbd5e1;
            --muted: #475569;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        nav {
            background: rgba(12,20,32,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--cyan);
            letter-spacing: -0.5px;
        }
        .logo span {
            color: var(--muted);
            font-weight: 400;
        }
        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
            50% { opacity: .7; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
        }
        .api-badge {
            font-size: 11px;
            color: var(--muted);
            background: var(--s2);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 20px;
        }
        main {
            padding: 28px 32px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .sec-title {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sec-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .pipeline-bar {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 28px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 0;
            overflow-x: auto;
        }
        .status-card {
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .metric {
            text-align: center;
        }
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--cyan);
            margin-bottom: 4px;
        }
        .metric-label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn {
            background: var(--cyan);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .btn:hover {
            background: #0284c7;
        }
        .btn:disabled {
            background: var(--muted);
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Medi<span>Pipeline</span></div>
        <div class="nav-right">
            <div class="pulse"></div>
            <div class="api-badge">API Running</div>
        </div>
    </nav>

    <main>
        <section>
            <h1 class="sec-title">Pipeline Control</h1>
            <div class="pipeline-bar">
                <button id="runPipelineBtn" class="btn">Run Pipeline</button>
                <div id="pipelineStatus" style="margin-left: 20px; color: var(--muted);">Status: Checking...</div>
            </div>
        </section>

        <section>
            <h1 class="sec-title">Dashboard Overview</h1>
            <div class="status-card">
                <div id="summaryMetrics" class="status-grid">
                    <div class="metric">
                        <div class="metric-value">--</div>
                        <div class="metric-label">Total Patients</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">--</div>
                        <div class="metric-label">Total Anomalies</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">--</div>
                        <div class="metric-label">Critical Issues</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">--</div>
                        <div class="metric-label">Data Records</div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h1 class="sec-title">Pipeline Status</h1>
            <div class="status-card">
                <div id="pipelineFiles">
                    Loading pipeline status...
                </div>
            </div>
        </section>

        <section>
            <h1 class="sec-title">Recent Anomalies</h1>
            <div class="status-card">
                <div id="anomaliesList">
                    Loading anomalies...
                </div>
            </div>
        </section>
    </main>

    <script>
        // API base URL
        const API_BASE = window.location.origin + '/api';

        // DOM elements
        const runPipelineBtn = document.getElementById('runPipelineBtn');
        const pipelineStatus = document.getElementById('pipelineStatus');
        const summaryMetrics = document.getElementById('summaryMetrics');
        const pipelineFiles = document.getElementById('pipelineFiles');
        const anomaliesList = document.getElementById('anomaliesList');

        // Load dashboard data
        async function loadDashboard() {
            try {
                // Load summary
                const summaryResponse = await fetch(`${API_BASE}/dashboard/summary`);
                const summary = await summaryResponse.json();

                // Update metrics
                const metrics = summaryMetrics.children;
                metrics[0].querySelector('.metric-value').textContent = summary.total_patients || 0;
                metrics[1].querySelector('.metric-value').textContent = summary.total_anomalies || 0;
                metrics[2].querySelector('.metric-value').textContent = summary.critical || 0;
                metrics[3].querySelector('.metric-value').textContent = summary.total_vitals || 0;

                // Load pipeline status
                const statusResponse = await fetch(`${API_BASE}/pipeline/status`);
                const status = await statusResponse.json();

                pipelineFiles.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
                        ${Object.entries(status.files).map(([key, exists]) => `
                            <div style="padding: 8px; background: ${exists ? 'var(--green)' : 'var(--red)'}; border-radius: 4px; color: white; font-size: 12px;">
                                ${key}: ${exists ? '✓' : '✗'}
                            </div>
                        `).join('')}
                    </div>
                    <div style="margin-top: 10px; color: var(--muted);">
                        Progress: ${status.completed}/${status.total} files ready
                    </div>
                `;

                // Load recent anomalies
                const anomaliesResponse = await fetch(`${API_BASE}/anomalies?severity=critical&_limit=5`);
                const anomalies = await anomaliesResponse.json();

                anomaliesList.innerHTML = anomalies.length > 0 ?
                    `<div style="display: grid; gap: 8px;">
                        ${anomalies.slice(0, 5).map(anomaly => `
                            <div style="padding: 8px; background: var(--s1); border: 1px solid var(--border); border-radius: 4px;">
                                <strong>${anomaly.anomaly_type}</strong> - Patient ${anomaly.patient_id}
                                <span style="color: var(--red); float: right;">${anomaly.severity}</span>
                            </div>
                        `).join('')}
                    </div>` :
                    '<div style="color: var(--muted);">No anomalies detected</div>';

            } catch (error) {
                console.error('Error loading dashboard:', error);
                pipelineFiles.innerHTML = '<div style="color: var(--red);">Error loading pipeline status</div>';
                anomaliesList.innerHTML = '<div style="color: var(--red);">Error loading anomalies</div>';
            }
        }

        // Run pipeline
        async function runPipeline() {
            try {
                runPipelineBtn.disabled = true;
                runPipelineBtn.textContent = 'Running...';
                pipelineStatus.textContent = 'Status: Running pipeline...';

                const response = await fetch(`${API_BASE}/pipeline/run`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    pipelineStatus.textContent = 'Status: Pipeline completed successfully!';
                    pipelineStatus.style.color = 'var(--green)';
                    // Reload dashboard after pipeline completes
                    setTimeout(() => {
                        loadDashboard();
                        pipelineStatus.textContent = 'Status: Ready';
                        pipelineStatus.style.color = 'var(--text)';
                    }, 1000);
                } else {
                    pipelineStatus.textContent = `Status: Error - ${result.detail}`;
                    pipelineStatus.style.color = 'var(--red)';
                }

            } catch (error) {
                console.error('Error running pipeline:', error);
                pipelineStatus.textContent = 'Status: Error running pipeline';
                pipelineStatus.style.color = 'var(--red)';
            } finally {
                runPipelineBtn.disabled = false;
                runPipelineBtn.textContent = 'Run Pipeline';
            }
        }

        // Event listeners
        runPipelineBtn.addEventListener('click', runPipeline);

        // Initial load
        loadDashboard();

        // Auto-refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
